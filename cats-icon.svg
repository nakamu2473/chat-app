<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <style>
    .whisker { fill: none; stroke-linecap: round; stroke-width: 1.1; opacity: 0.65; }
    .feature { fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-width: 1.5; }
  </style>

  <!-- ── ネコ氏 (left, teal) ── -->
  <!-- body/chest -->
  <path fill="#EAF0EA" stroke="#7A8C7E" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"
    d="M20,152 Q28,122 44,115 Q60,122 68,152 Z"/>
  <!-- left ear -->
  <path fill="#EAF0EA" stroke="#7A8C7E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
    d="M23,83 L27,64 L39,79"/>
  <path fill="#C8D4CA" stroke="none" d="M25,82 L28,67 L37,78"/>
  <!-- right ear -->
  <path fill="#EAF0EA" stroke="#7A8C7E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
    d="M50,79 L55,63 L64,78"/>
  <path fill="#C8D4CA" stroke="none" d="M52,78 L56,66 L62,77"/>
  <!-- head -->
  <ellipse fill="#EAF0EA" stroke="#7A8C7E" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"
    cx="44" cy="97" rx="23" ry="21" transform="rotate(-3, 44, 97)"/>
  <!-- eyes -->
  <ellipse fill="#4A6A5A" cx="36" cy="93" rx="4" ry="4.5"/>
  <ellipse fill="#4A6A5A" cx="52" cy="93" rx="4" ry="4.5"/>
  <circle fill="white" cx="37.5" cy="91.5" r="1.3"/>
  <circle fill="white" cx="53.5" cy="91.5" r="1.3"/>
  <!-- nose -->
  <path class="feature" d="M42,101 L44,103.5 L46,101" stroke="#7A8C7E"/>
  <!-- mouth -->
  <path class="feature" d="M42,103.5 Q44,107 46,103.5" stroke="#7A8C7E"/>
  <!-- forehead mark -->
  <path fill="none" stroke="#7A8C7E" stroke-width="1.0" stroke-linecap="round" opacity="0.4"
    d="M41,84 Q44,82 47,84"/>
  <!-- whiskers left -->
  <line class="whisker" x1="17" y1="99" x2="37" y2="101" stroke="#7A8C7E"/>
  <line class="whisker" x1="17" y1="103" x2="37" y2="103" stroke="#7A8C7E"/>
  <!-- whiskers right -->
  <line class="whisker" x1="51" y1="101" x2="71" y2="99" stroke="#7A8C7E"/>
  <line class="whisker" x1="51" y1="103" x2="71" y2="103" stroke="#7A8C7E"/>

  <!-- ── メイ (center, rose, in front) ── -->
  <!-- body/chest -->
  <path fill="#F0ECEA" stroke="#8C7E7A" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"
    d="M55,152 Q64,118 80,111 Q96,118 105,152 Z"/>
  <!-- left ear -->
  <path fill="#F0ECEA" stroke="#8C7E7A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
    d="M57,70 L62,51 L74,67"/>
  <path fill="#DCC0C0" stroke="none" d="M59,69 L63,54 L72,66"/>
  <!-- right ear -->
  <path fill="#F0ECEA" stroke="#8C7E7A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
    d="M86,67 L92,50 L102,68"/>
  <path fill="#DCC0C0" stroke="none" d="M88,66 L93,53 L100,67"/>
  <!-- head -->
  <ellipse fill="#F0ECEA" stroke="#8C7E7A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"
    cx="80" cy="83" rx="25" ry="23"/>
  <!-- blush -->
  <ellipse cx="63" cy="90" rx="6" ry="3.5" fill="#D4A0A0" opacity="0.25"/>
  <ellipse cx="97" cy="90" rx="6" ry="3.5" fill="#D4A0A0" opacity="0.25"/>
  <!-- eyes - big round -->
  <ellipse fill="#5A4848" cx="71" cy="79" rx="5" ry="5.5"/>
  <ellipse fill="#5A4848" cx="89" cy="79" rx="5" ry="5.5"/>
  <circle fill="white" cx="72.5" cy="77" r="1.6"/>
  <circle fill="white" cx="90.5" cy="77" r="1.6"/>
  <!-- nose -->
  <path class="feature" d="M78,89 L80,91.5 L82,89" stroke="#8C7E7A"/>
  <!-- mouth -->
  <path class="feature" d="M77,91.5 Q80,95.5 83,91.5" stroke="#8C7E7A"/>
  <!-- whiskers left -->
  <line class="whisker" x1="48" y1="87" x2="70" y2="89" stroke="#8C7E7A"/>
  <line class="whisker" x1="47" y1="91" x2="69" y2="91" stroke="#8C7E7A"/>
  <!-- whiskers right -->
  <line class="whisker" x1="90" y1="89" x2="112" y2="87" stroke="#8C7E7A"/>
  <line class="whisker" x1="91" y1="91" x2="113" y2="91" stroke="#8C7E7A"/>

  <!-- ── カル (right, warm orange) ── -->
  <!-- body/chest -->
  <path fill="#F5EAD8" stroke="#A89880" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"
    d="M92,152 Q100,122 116,115 Q132,122 140,152 Z"/>
  <!-- left ear -->
  <path fill="#F5EAD8" stroke="#A89880" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
    d="M97,83 L101,65 L113,79"/>
  <path fill="#E0C89A" stroke="none" d="M99,82 L102,68 L111,78"/>
  <!-- right ear -->
  <path fill="#F5EAD8" stroke="#A89880" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
    d="M119,79 L125,63 L135,78"/>
  <path fill="#E0C89A" stroke="none" d="M121,78 L126,66 L133,77"/>
  <!-- head -->
  <ellipse fill="#F5EAD8" stroke="#A89880" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"
    cx="116" cy="97" rx="23" ry="21" transform="rotate(3, 116, 97)"/>
  <!-- tabby stripes on forehead -->
  <path fill="none" stroke="#C4A070" stroke-width="1.1" stroke-linecap="round" opacity="0.45"
    d="M112,85 Q116,83 120,85"/>
  <path fill="none" stroke="#C4A070" stroke-width="1.0" stroke-linecap="round" opacity="0.35"
    d="M111,89 Q116,87 121,89"/>
  <!-- eyes - happy squint -->
  <path class="feature" d="M107,92 Q111,88 115,92" stroke="#A89880" stroke-width="1.8"/>
  <path class="feature" d="M117,92 Q121,88 125,92" stroke="#A89880" stroke-width="1.8"/>
  <!-- nose -->
  <path class="feature" d="M114,101 L116,103.5 L118,101" stroke="#A89880"/>
  <!-- mouth -->
  <path class="feature" d="M113,103.5 Q116,107.5 119,103.5" stroke="#A89880"/>
  <!-- whiskers left -->
  <line class="whisker" x1="89" y1="99" x2="109" y2="101" stroke="#A89880"/>
  <line class="whisker" x1="89" y1="103" x2="109" y2="103" stroke="#A89880"/>
  <!-- whiskers right -->
  <line class="whisker" x1="123" y1="101" x2="143" y2="99" stroke="#A89880"/>
  <line class="whisker" x1="123" y1="103" x2="143" y2="103" stroke="#A89880"/>
</svg>
