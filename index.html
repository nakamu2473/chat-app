<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>ふたりのアプリ</title>

<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ふたりのアプリ">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="theme-color" content="#3d6b5e">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<!-- 設定ファイル（config.js が存在しない場合はデモモードで動作） -->
<script>
  // config.js が読み込まれていない場合のフォールバック
  if (typeof APP_CONFIG === 'undefined') {
    APP_CONFIG = null;
  }
</script>
<script src="config.js" onerror="APP_CONFIG=null;"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e8e5e0;
    --text: #1a1a1a;
    --text-muted: #888880;
    --accent: #3d6b5e;
    --accent-light: #e8f0ed;
    --accent2: #c4773b;
    --accent2-light: #faf0e8;
    --danger: #c0392b;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    flex-shrink: 0;
    gap: 8px;
  }
  .app-title { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: 0.04em; white-space: nowrap; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .sync-indicator { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; white-space: nowrap; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; transition: background 0.3s; }
  .sync-dot.ok { background: #4caf50; }
  .sync-dot.syncing { background: var(--accent2); animation: pulse 0.8s infinite; }
  .sync-dot.error { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .user-switch { display: flex; gap: 6px; }
  .user-btn { padding: 4px 12px; border-radius: 20px; border: 1.5px solid var(--border); background: transparent; font-size: 12px; font-family: inherit; cursor: pointer; color: var(--text-muted); transition: all 0.18s; }
  .user-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }

  /* TABS */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; flex-shrink: 0; }
  .tab { flex: 1; padding: 12px 4px; text-align: center; font-size: 11px; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 2.5px solid transparent; transition: all 0.18s; display: flex; flex-direction: column; align-items: center; gap: 3px; letter-spacing: 0.03em; }
  .tab .icon { font-size: 18px; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  main { flex: 1; overflow: hidden; min-height: 0; }
  .page { display: none; height: 100%; flex-direction: column; overflow: hidden; min-height: 0; }
  .page.active { display: flex; }

  .section-inner { flex: 1; overflow-y: auto; padding: 16px; min-height: 0; }
  .input-bar { padding: 10px 12px; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; position: sticky; bottom: 0; z-index: 10; width: 100%; box-sizing: border-box; }
  .input-wrap { display: flex; align-items: center; border: 1.5px solid var(--border); border-radius: 24px; background: var(--bg); padding: 4px 4px 4px 14px; transition: border-color 0.15s; gap: 4px; }
  .input-wrap:focus-within { border-color: var(--accent); }
  .input-bar input { flex: 1; border: none; background: transparent; padding: 6px 0; font-size: 16px; font-family: inherit; outline: none; color: var(--text); min-width: 0; }
  .input-bar input:focus { border-color: transparent; }
  .btn-send { background: var(--accent); color: #fff; border: none; border-radius: 20px; padding: 7px 14px; font-size: 14px; cursor: pointer; font-family: inherit; font-weight: 500; white-space: nowrap; transition: opacity 0.15s; flex-shrink: 0; }
  .btn-send:hover { opacity: 0.85; }
  .btn-upload { background: var(--accent); color: #fff; border: none; border-radius: 20px; padding: 7px 14px; font-size: 14px; cursor: pointer; font-family: inherit; font-weight: 500; white-space: nowrap; flex-shrink: 0; display: inline-flex; align-items: center; }
  .btn-upload:hover { opacity: 0.85; }

  /* CHAT */
  .chat-messages { display: flex; flex-direction: column; gap: 10px; padding: 16px; }
  .msg-wrap { display: flex; flex-direction: column; max-width: 72%; animation: fadeUp 0.2s ease; }
  .msg-wrap.me { align-self: flex-end; align-items: flex-end; }
  .msg-wrap.other { align-self: flex-start; align-items: flex-start; }
  .msg-name { font-size: 10px; color: var(--text-muted); margin-bottom: 3px; font-weight: 500; }
  .msg-bubble { padding: 9px 13px; border-radius: 14px; font-size: 14px; line-height: 1.5; word-break: break-word; }
  .msg-wrap.me .msg-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .msg-wrap.other .msg-bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg-time { font-size: 10px; color: var(--text-muted); margin-top: 3px; font-family: 'DM Mono', monospace; }

  /* SHOP */
  .shop-section { padding: 0 0 16px; }
  .shop-section h3 { font-size: 12px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
  .shop-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; animation: fadeUp 0.2s ease; transition: opacity 0.2s; }
  .shop-item.checked { opacity: 0.45; }
  .shop-item.checked .item-text { text-decoration: line-through; }
  .shop-check { width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--border); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; background: transparent; font-size: 12px; }
  .shop-item.checked .shop-check { background: var(--accent); border-color: var(--accent); color: #fff; }
  .item-text { flex: 1; font-size: 14px; }
  .item-who { font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 10px; background: var(--accent-light); color: var(--accent); }
  .item-del { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 16px; padding: 0 2px; transition: color 0.15s; }
  .item-del:hover { color: var(--danger); }

  /* MEMO */
  .memo-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; animation: fadeUp 0.2s ease; }
  .memo-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .memo-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; padding: 2px 7px; border-radius: 8px; }
  .memo-tag.todo { background: var(--accent2-light); color: var(--accent2); }
  .memo-tag.memo { background: var(--accent-light); color: var(--accent); }
  .memo-who { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-left: auto; }
  .memo-text { font-size: 14px; line-height: 1.5; }
  .memo-del { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 14px; transition: color 0.15s; }
  .memo-del:hover { color: var(--danger); }
  .memo-done-check { width: 18px; height: 18px; border-radius: 5px; border: 2px solid var(--border); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; background: transparent; transition: all 0.15s; }
  .memo-item.done .memo-done-check { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .memo-item.done .memo-text { text-decoration: line-through; opacity: 0.5; }
  .memo-type-toggle { display: flex; gap: 6px; margin-bottom: 8px; }
  .type-btn { padding: 5px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: transparent; font-size: 12px; cursor: pointer; font-family: inherit; color: var(--text-muted); transition: all 0.15s; }
  .type-btn.active { background: var(--accent2); border-color: var(--accent2); color: #fff; font-weight: 600; }

  /* CALENDAR */
  .cal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .cal-month { font-size: 16px; font-weight: 700; }
  .cal-nav { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-muted); padding: 4px 8px; border-radius: 6px; transition: background 0.15s; }
  .cal-nav:hover { background: var(--bg); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; padding: 10px 12px; flex-shrink: 0; }
  .cal-dow { text-align: center; font-size: 11px; font-weight: 700; color: var(--text-muted); padding: 4px 0; letter-spacing: 0.05em; }
  .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 5px; font-size: 13px; border-radius: 8px; cursor: pointer; transition: background 0.12s; gap: 2px; }
  .cal-day:hover { background: var(--accent-light); }
  .cal-day.today { background: var(--accent); color: #fff; font-weight: 700; }
  .cal-day.other-month { color: var(--border); cursor: default; }
  .dot-row { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; }
  .cal-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent2); flex-shrink: 0; }
  .cal-dot.me { background: var(--accent); }
  .cal-dot.gcal { background: #4285f4; }
  .cal-events { flex: 1; overflow-y: auto; padding: 12px 16px; }
  .cal-event-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 8px; margin-bottom: 6px; animation: fadeUp 0.2s ease; }
  .cal-event-item.other-user { border-left-color: var(--accent2); }
  .cal-event-item.gcal-event { border-left-color: #4285f4; }
  .event-date-badge { text-align: center; min-width: 36px; }
  .eday { font-size: 18px; font-weight: 700; line-height: 1; color: var(--accent); font-family: 'DM Mono', monospace; }
  .cal-event-item.other-user .eday { color: var(--accent2); }
  .cal-event-item.gcal-event .eday { color: #4285f4; }
  .emon { font-size: 10px; color: var(--text-muted); font-weight: 600; }
  .event-info { flex: 1; }
  .event-title { font-size: 14px; font-weight: 500; }
  .event-meta { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .event-del { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 14px; transition: color 0.15s; }
  .event-del:hover { color: var(--danger); }

  /* Gcal refresh button */
  .gcal-bar { padding: 8px 16px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
  .gcal-bar button { padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); background: transparent; font-size: 11px; cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .gcal-bar button:hover { background: var(--accent-light); }

  /* DEMO BANNER */
  .demo-banner { background: var(--accent2-light); border-bottom: 1px solid #e8c89a; padding: 8px 16px; font-size: 12px; color: var(--accent2); text-align: center; flex-shrink: 0; }

  .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; }
  .empty .big { font-size: 32px; margin-bottom: 8px; }

  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #222; color: #fff; font-size: 12px; padding: 8px 16px; border-radius: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s; white-space: nowrap; z-index: 999; }
  .toast.show { opacity: 1; }



  .tag-filter-bar { padding:10px 16px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; gap:6px; overflow-x:auto; flex-shrink:0; }
  .tag-filter-bar::-webkit-scrollbar { display:none; }
  .tag-chip { padding:4px 12px; border-radius:20px; border:1.5px solid var(--border); background:transparent; font-size:12px; font-family:inherit; cursor:pointer; white-space:nowrap; color:var(--text-muted); transition:all 0.15s; flex-shrink:0; }
  .tag-chip.active { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600; }
  .photo-tags { display:flex; gap:4px; flex-wrap:wrap; margin-top:6px; }
  .photo-tag { font-size:10px; background:var(--accent-light); color:var(--accent); border-radius:8px; padding:2px 7px; font-weight:600; }
  /* ALBUM */
  .album-toolbar { padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .album-sort-btns { display: flex; gap: 6px; }
  .sort-btn { padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--border); background: transparent; font-size: 12px; cursor: pointer; font-family: inherit; color: var(--text-muted); transition: all 0.15s; }
  .sort-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding-bottom: 8px; }
  .photo-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; animation: fadeUp 0.2s ease; position: relative; }
  .photo-img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; cursor: pointer; }
  .photo-info { padding: 8px 10px; }
  .photo-caption { font-size: 13px; color: var(--text); margin-bottom: 4px; word-break: break-word; }
  .photo-meta { display: flex; align-items: center; justify-content: space-between; }
  .photo-who { font-size: 11px; color: var(--text-muted); font-weight: 600; }
  .photo-date { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
  .photo-actions { display: flex; gap: 6px; align-items: center; }
  .heart-btn { background: none; border: none; font-size: 18px; cursor: pointer; line-height: 1; padding: 0; transition: transform 0.15s; }
  .heart-btn:active { transform: scale(1.3); }
  .photo-del { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 13px; transition: color 0.15s; }
  .photo-del:hover { color: var(--danger); }
  .btn-upload { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 9px 16px; font-size: 14px; cursor: pointer; font-family: inherit; font-weight: 500; white-space: nowrap; transition: opacity 0.15s; }
  .btn-upload:hover { opacity: 0.85; }
  /* 全画面表示 */
  .photo-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .photo-overlay img { max-width: 100%; max-height: 80vh; object-fit: contain; border-radius: 8px; }
  .photo-overlay-close { position: absolute; top: 16px; right: 20px; background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; }
  .photo-overlay-caption { color: #fff; font-size: 14px; margin-top: 12px; text-align: center; }
  .upload-progress { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; font-size: 12px; padding: 8px 20px; border-radius: 20px; z-index: 999; white-space: nowrap; }

  .water-section { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:8px 12px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .water-section-title { font-size:12px; font-weight:700; color:var(--text-muted); white-space:nowrap; }
  .water-btns { display:flex; gap:6px; }
  /* ===== CATS ===== */
  .cats-top { display:flex; flex-direction:column; gap:12px; padding:16px; }
  .cat-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px; display:flex; flex-direction:column; gap:10px; }
  .cat-card-header { display:flex; align-items:center; gap:12px; }
  .cat-avatar { width:52px; height:52px; border-radius:50%; object-fit:cover; background:var(--bg); border:2px solid var(--border); flex-shrink:0; font-size:28px; display:flex; align-items:center; justify-content:center; }
  .cat-avatar img { width:100%; height:100%; border-radius:50%; object-fit:cover; }
  .cat-info { flex:1; }
  .cat-name { font-size:16px; font-weight:700; }
  .cat-age { font-size:12px; color:var(--text-muted); }
  .cat-last-records { display:flex; gap:8px; flex-wrap:wrap; }
  .cat-record-badge { font-size:11px; color:var(--text-muted); background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:3px 8px; }
  .cat-quick-btns { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
  .cat-quick-btn { border:1.5px solid var(--border); background:var(--bg); border-radius:10px; padding:8px 4px; font-size:11px; font-weight:600; cursor:pointer; font-family:inherit; color:var(--text); display:flex; flex-direction:column; align-items:center; gap:3px; transition:all 0.15s; }
  .cat-quick-btn:active { background:var(--accent-light); border-color:var(--accent); }
  .cat-quick-btn .qicon { font-size:20px; }
  .cat-detail-btn { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; width:100%; transition:opacity 0.15s; }
  .cat-detail-btn:hover { opacity:0.85; }

  /* cat detail */
  .cat-detail-header { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 16px; display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .cat-detail-back { background:none; border:none; font-size:20px; cursor:pointer; color:var(--text-muted); padding:0 4px; }
  .cat-detail-name { font-size:16px; font-weight:700; flex:1; }
  .cat-detail-avatar { width:36px; height:36px; border-radius:50%; object-fit:cover; }
  .cat-tabs { display:flex; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; overflow-x:auto; }
  .cat-tab { flex-shrink:0; padding:10px 14px; font-size:11px; font-weight:500; color:var(--text-muted); cursor:pointer; border-bottom:2.5px solid transparent; white-space:nowrap; transition:all 0.15s; }
  .cat-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  .cat-tab-content { flex:1; overflow-y:auto; padding:16px; min-height:0; }

  /* profile */
  .profile-form { display:flex; flex-direction:column; gap:14px; }
  .profile-avatar-wrap { display:flex; align-items:center; gap:14px; }
  .profile-avatar-img { width:72px; height:72px; border-radius:50%; object-fit:cover; background:var(--bg); border:2px solid var(--border); font-size:36px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .profile-avatar-img img { width:100%; height:100%; border-radius:50%; object-fit:cover; }
  .form-row { display:flex; flex-direction:column; gap:4px; }
  .form-label { font-size:12px; font-weight:600; color:var(--text-muted); letter-spacing:0.04em; }
  .form-input { border:1.5px solid var(--border); border-radius:8px; padding:9px 12px; font-size:15px; font-family:inherit; outline:none; background:var(--bg); color:var(--text); transition:border-color 0.15s; width:100%; }
  .form-input:focus { border-color:var(--accent); }
  .form-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .form-save-btn { background:var(--accent); color:#fff; border:none; border-radius:10px; padding:12px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; transition:opacity 0.15s; }
  .form-save-btn:hover { opacity:0.85; }
  .hospital-link { font-size:12px; color:var(--accent); text-decoration:none; margin-top:2px; display:inline-block; }

  /* weight */
  .weight-add-bar { display:flex; gap:8px; margin-bottom:16px; }
  .weight-input { border:1.5px solid var(--border); border-radius:8px; padding:9px 12px; font-size:15px; font-family:inherit; outline:none; background:var(--bg); color:var(--text); width:100px; }
  .weight-chart-wrap { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px; margin-bottom:16px; }
  .weight-list { display:flex; flex-direction:column; gap:6px; }
  .weight-item { display:flex; align-items:center; gap:10px; padding:10px 12px; background:var(--surface); border:1px solid var(--border); border-radius:8px; }
  .weight-val { font-size:16px; font-weight:700; color:var(--accent); font-family:'DM Mono',monospace; }
  .weight-date { font-size:12px; color:var(--text-muted); flex:1; }
  .weight-del { background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:14px; }

  /* food */

  .visit-del { background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:14px; float:right; }

  /* symptom */
  .symptom-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:8px; }
  .symptom-level { font-size:10px; font-weight:700; padding:2px 8px; border-radius:8px; display:inline-block; margin-bottom:4px; }
  .symptom-level.low { background:#e8f5e9; color:#388e3c; }

  .symptom-del { background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:14px; float:right; }

  /* modal */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:500; display:flex; align-items:flex-end; justify-content:center; }
  .modal-box { background:var(--surface); border-radius:20px 20px 0 0; padding:20px; width:100%; max-width:480px; max-height:80vh; overflow-y:auto; }
  .modal-title { font-size:16px; font-weight:700; margin-bottom:14px; }
  .modal-btns { display:flex; gap:8px; margin-top:14px; }
  .modal-cancel { flex:1; background:var(--bg); border:1.5px solid var(--border); border-radius:10px; padding:11px; font-size:14px; font-family:inherit; cursor:pointer; }
  .modal-ok { flex:1; background:var(--accent); color:#fff; border:none; border-radius:10px; padding:11px; font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; }
  .select-input { border:1.5px solid var(--border); border-radius:8px; padding:9px 12px; font-size:15px; font-family:inherit; outline:none; background:var(--bg); color:var(--text); width:100%; margin-bottom:8px; }
  .textarea-input { border:1.5px solid var(--border); border-radius:8px; padding:9px 12px; font-size:14px; font-family:inherit; outline:none; background:var(--bg); color:var(--text); width:100%; resize:none; min-height:80px; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ログインボーナスモーダル */
  @keyframes bonusPop { 0%{transform:scale(0.7);opacity:0} 70%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
  @keyframes floatY { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .bonus-overlay {
    position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;
    display:flex;align-items:center;justify-content:center;

  .bonus-btn {

  /* たまにメッセージトースト */

  }
  #love-toast.show { opacity:1;transform:translateX(-50%) translateY(0); }
</style>
</head>

<div class="toast" id="toast"></div>
<div id="love-toast"></div>

<script>
// ============================================================
//  UTILS
// ============================================================
function todayStr() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmtTime(d) {
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
// ============================================================
//  ログインボーナス
// ============================================================
const BONUS_STREAK_MESSAGES = {
  1:   'また来てくれた！嬉しいな🌸',
  3:   '3日連続！いい調子だよ✨',
  7:   '1週間連続！すごい！🎉',
  14:  '2週間連続！ありがとう💕',
  30:  '1ヶ月連続！大好きだよ🥰',
  100: '100日連続！！伝説だよ🏆',
};

function getBonusStreakEmoji(streak) {
  if (streak >= 100) return '🏆';
  if (streak >= 30)  return '🥰';
  if (streak >= 14)  return '💕';
  if (streak >= 7)   return '🎉';
  if (streak >= 3)   return '✨';
  return '🌟';
}

function getBonusStreakMessage(streak) {
  const keys = Object.keys(BONUS_STREAK_MESSAGES).map(Number).sort((a,b) => b-a);
  for (const k of keys) {
    if (streak >= k) return BONUS_STREAK_MESSAGES[k];
  }
  return 'また来てくれた！嬉しいな🌸';
}

async function checkLoginBonus(user) {
  const today = new Date().toISOString().slice(0, 10);
  let data = { lastDate: null, streak: 0, totalDays: 0 };

  if (db) {
    const snap = await db.ref('loginBonus/' + user).once('value');
    if (snap.val()) data = snap.val();
  } else {
    const stored = localStorage.getItem('futari_loginBonus_' + user);
    if (stored) { try { data = JSON.parse(stored); } catch(e) {} }
  }

  if (data.lastDate === today) return; // 今日はもう表示済み

  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  data.streak    = (data.lastDate === yesterday) ? (data.streak || 0) + 1 : 1;
  data.totalDays = (data.totalDays || 0) + 1;
  data.lastDate  = today;

  if (db) {
    db.ref('loginBonus/' + user).set(data);
  } else {
    localStorage.setItem('futari_loginBonus_' + user, JSON.stringify(data));
  }

  setTimeout(() => showBonusModal(user, data.streak, data.totalDays), 800);
}

function showBonusModal(user, streak, totalDays) {
  const emoji = getBonusStreakEmoji(streak);
  const msg   = getBonusStreakMessage(streak);
  const overlay = document.createElement('div');
  overlay.className = 'bonus-overlay';
  overlay.innerHTML = `
    <div class="bonus-box">
      <span class="bonus-emoji">${emoji}</span>
      <div class="bonus-title">ログインボーナス！</div>
      <div class="bonus-streak">${streak}</div>
      <div class="bonus-streak-label">日連続ログイン中 🔥（累計${totalDays}日）</div>
      <div class="bonus-msg">${msg}</div>
      <button class="bonus-btn" onclick="this.closest('.bonus-overlay').remove()">やったー！</button>
    </div>
  `;
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

// ============================================================
//  たまにメッセージ
// ============================================================
const FUN_MESSAGES = [
  'ふたりでいるのが一番だよね🥰',
  'いつもありがとう💕',
  'そういえば、好きだよ❤️',
  'もふもふしたくなってきた🐱',
  '今日もいい日にしようね✨',
  'ご飯なに食べたい？🍽️',
  '大好きだよ、知ってた？💖',
  'ずっと一緒にいようね🌿',
  'お疲れさま、いつもありがとう🌸',
  'ふたりのアプリ、使ってくれてありがとう🤍',
  'いつもそばにいるよ🌙',
  '猫も見守ってるよ🐈',
  'しあわせだな〜☀️',
  'ありがとうが足りないくらい感謝してるよ🙏',
  'ふたりなら何でもできるよ💪',
  'すき❤️',
  'またね、また会おうね🌈',
  '今何してる？😊',
  'ずっと大切にするよ🌷',
  'おつかれ！ゆっくりしてね🍵',
];

function showLoveToast(msg) {
  const el = document.getElementById('love-toast');
  if (!el) return;
  el.textContent = '💌 ' + msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3500);
}

function maybeShowFunMessage() {
  if (Math.random() > 0.15) return; // 15%の確率で表示
  const msg = FUN_MESSAGES[Math.floor(Math.random() * FUN_MESSAGES.length)];
  setTimeout(() => showLoveToast(msg), 500);
}
function setSyncStatus(status, label) {
  document.getElementById('sync-dot').className = 'sync-dot ' + status;
  document.getElementById('sync-label').textContent = label;
}

// ============================================================
//  STATE
// ============================================================
let currentUser = 'ゆき';
let memoType = 'memo';
let calYear, calMonth;
let currentTab = 'chat';
let gcalEvents = []; // Googleカレンダーから取得したイベント

// アプリ内で管理するイベント（Firebase / localStorage）
let state = { chat: [], shop: [], memo: [], events: [], photos: [], cats: {}, water_log: {} };

// ============================================================
//  FIREBASE or localStorage
// ============================================================
let db = null;
let storage = null;
const useFirebase = !!(APP_CONFIG && APP_CONFIG.firebase && APP_CONFIG.firebase.apiKey !== 'YOUR_API_KEY');

if (useFirebase) {
  try {
    firebase.initializeApp(APP_CONFIG.firebase);
    db = firebase.database();
    storage = firebase.storage();
  } catch(e) {
    console.error('Firebase init error:', e);
  }
} else {
  document.getElementById('demo-banner').style.display = 'block';
}

// ---------- Firebase helpers ----------
function fbRef(path) { return db ? db.ref(path) : null; }

function fbSet(path, value) {
  if (db) return fbRef(path).set(value);
  // localStorage fallback
  try { localStorage.setItem('futari_' + path.replace(/\//g,'_'), JSON.stringify(value)); } catch(e) {}
  return Promise.resolve();
}

function fbGet(path) {
  if (db) return fbRef(path).get().then(s => s.exists() ? s.val() : null);
  try {
    const raw = localStorage.getItem('futari_' + path.replace(/\//g,'_'));
    return Promise.resolve(raw ? JSON.parse(raw) : null);
  } catch(e) { return Promise.resolve(null); }
}

// ---------- Firebase realtime listeners ----------
function setupRealtimeListeners() {
  if (!db) return;

  db.ref('chat').on('value', snap => {
    const val = snap.val();
    state.chat = val ? Object.values(val).sort((a,b) => (a.ts||0)-(b.ts||0)) : [];
    if (currentTab === 'chat') renderChat();
    setSyncStatus('ok', '同期済み');
  });

  db.ref('shop').on('value', snap => {
    const val = snap.val();
    state.shop = val ? Object.values(val) : [];
    if (currentTab === 'shop') renderShop();
  });

  db.ref('memo').on('value', snap => {
    const val = snap.val();
    state.memo = val ? Object.values(val).sort((a,b) => (b.ts||0)-(a.ts||0)) : [];
    if (currentTab === 'memo') renderMemo();
  });

  db.ref('events').on('value', snap => {
    const val = snap.val();
    state.events = val ? Object.values(val) : [];
    if (currentTab === 'cal') renderCal();
  });

  db.ref('photos').on('value', snap => {
    const val = snap.val();
    state.photos = val ? Object.values(val) : [];
    if (currentTab === 'album') renderAlbum();
  });

  db.ref('cats').on('value', snap => {
    const val = snap.val();
    state.cats = val || {};
    if (currentTab === 'cats') renderCatsTop();
  });

  db.ref('water_log').on('value', snap => {
    const val = snap.val();
    state.water_log = val || {};
    if (currentTab === 'cats') renderCatsTop();
  });
}

// ============================================================
//  INITIAL LOAD
// ============================================================
async function initialLoad() {
  setSyncStatus('syncing', '読み込み中…');

  if (useFirebase && db) {
    // Firebase: リアルタイムリスナーに任せる
    setupRealtimeListeners();
    setSyncStatus('ok', '同期済み');
  } else {
    // localStorage fallback
    try {
      const [chat, shop, memo, events] = await Promise.all([
        fbGet('chat'), fbGet('shop'), fbGet('memo'), fbGet('events')
      ]);
      state.chat   = chat   ? (Array.isArray(chat)   ? chat   : Object.values(chat))   : [];
      state.shop   = shop   ? (Array.isArray(shop)   ? shop   : Object.values(shop))   : [];
      state.memo   = memo   ? (Array.isArray(memo)   ? memo   : Object.values(memo))   : [];
      state.events = events ? (Array.isArray(events) ? events : Object.values(events)) : [];
    } catch(e) {}
    setSyncStatus('ok', 'ローカル保存');
    renderAll();
  }

  // Googleカレンダー読み込み
  if (APP_CONFIG && APP_CONFIG.calendars) {
    document.getElementById('gcal-bar').style.display = 'flex';
    loadGcalEvents();
  }

  // ログインボーナスチェック
  setTimeout(() => checkLoginBonus(currentUser), 500);
}

// ============================================================
//  USER / TABS
// ============================================================
function setUser(u) {
  currentUser = u;
  document.querySelectorAll('.user-btn').forEach(b => b.classList.toggle('active', b.textContent === u));
  renderAll();
  // FCMトークンを新しいユーザーで再登録
  if (typeof fcmToken !== 'undefined' && fcmToken && db) {
    db.ref('fcmTokens/' + u).set({ token: fcmToken, updatedAt: Date.now() });
  }
  // ログインボーナスチェック（ユーザー切り替え時）
  checkLoginBonus(u);
}

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

const DOW = ['日','月','火','水','木','金','土'];
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function initCal() {
  const today = new Date();
  calYear = today.getFullYear();
  calMonth = today.getMonth();
  document.getElementById('cal-date').value = todayStr();
}

function renderCal() {
  document.getElementById('cal-month-label').textContent = calYear + '年 ' + MONTHS[calMonth];
  const grid = document.getElementById('cal-grid');
  let html = DOW.map(d => `<div class="cal-dow">${d}</div>`).join('');
  const first = new Date(calYear, calMonth, 1).getDay();
  const days  = new Date(calYear, calMonth + 1, 0).getDate();
  const today = new Date();

  for (let i = 0; i < first; i++) html += `<div class="cal-day other-month"></div>`;
  for (let d = 1; d <= days; d++) {
    const dateStr = calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isToday = today.getFullYear()===calYear && today.getMonth()===calMonth && today.getDate()===d;
    const appEvs  = state.events.filter(e => e.date === dateStr);
    const gcEvs   = gcalEvents.filter(e => e.date === dateStr);
    const dots = [
      ...appEvs.map(e => `<div class="cal-dot ${e.who === currentUser ? 'me' : ''}"></div>`),
      ...gcEvs.map(() => `<div class="cal-dot gcal"></div>`),
    ].join('');
    html += `<div class="cal-day ${isToday ? 'today' : ''}" onclick="calSelectDay('${dateStr}')">
      ${d}
      ${dots ? `<div class="dot-row">${dots}</div>` : ''}
    </div>`;
  }
  grid.innerHTML = html;
  renderEvents(null);
}

// CORS回避のためcorsproxy.io経由で取得
const CORS_PROXY = 'https://corsproxy.io/?';

async function fetchIcal(url) {
  const res = await fetch(CORS_PROXY + encodeURIComponent(url));
  if (!res.ok) throw new Error('fetch failed: ' + res.status);
  return res.text();
}

function parseIcal(text, calName) {
  const events = [];
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  let ev = null;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (line.startsWith('BEGIN:VEVENT')) { ev = {}; continue; }
    if (line.startsWith('END:VEVENT') && ev) {
      if (ev.date && ev.title) events.push({ ...ev, who: calName, id: 'gcal_' + uid() });
      ev = null; continue;
    }
    if (!ev) continue;
    if (line.startsWith('SUMMARY:')) {
      ev.title = line.slice(8).trim();
    } else if (line.startsWith('DTSTART')) {
      // DTSTART;VALUE=DATE:20260405 or DTSTART:20260405T...
      const val = line.split(':').slice(1).join(':').trim();
      const raw = val.slice(0,8);
      if (raw.length === 8 && /^\d+$/.test(raw)) {
        ev.date = raw.slice(0,4)+'-'+raw.slice(4,6)+'-'+raw.slice(6,8);
      }
    }
  }
  return events;
}

async function loadGcalEvents() {
  if (!APP_CONFIG || !APP_CONFIG.calendars) return;
  const statusEl = document.getElementById('gcal-status');
  statusEl.textContent = '読み込み中…';
  gcalEvents = [];
  const cals = Object.values(APP_CONFIG.calendars);
  let ok = 0;
  for (const cal of cals) {
    if (!cal.icalUrl || cal.icalUrl.includes('XXXXXXXX')) continue;
    try {
      const text = await fetchIcal(cal.icalUrl);
      const evs  = parseIcal(text, cal.name);
      gcalEvents = gcalEvents.concat(evs);
      ok++;
    } catch(e) {
      console.warn('Gcal fetch error:', cal.name, e);
    }
  }
  statusEl.textContent = ok > 0 ? `${gcalEvents.length}件取得` : 'エラー';
  if (currentTab === 'cal') renderCal();
}

async function uploadPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const caption = document.getElementById('photo-caption').value.trim();
  // タグ選択モーダルを先に出す
  const selectedTags = await showTagSelectModal();
  if (selectedTags === null) { input.value = ''; return; } // キャンセル

  if (!storage) {
    showToast('Firebase Storageが設定されてないよ');
    input.value = '';
    return;
  }

  // プログレス表示
  const prog = document.createElement('div');
  prog.className = 'upload-progress';
  prog.textContent = '📤 アップロード中…';
  document.body.appendChild(prog);

  try {
    const photoId = uid();
    const ext = file.name.split('.').pop();
    const url = await uploadToStorage(file, `photos/${photoId}.${ext}`);

    const now = new Date();
    const dateStr = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')}`;
    const photo = { id: photoId, url, caption, who: currentUser, ts: Date.now(), dateStr, fav: false, tags: selectedTags };

    if (db) {
      await db.ref('photos/' + photoId).set(photo);

      state.photos = state.photos || [];

      renderAlbum();
    }

    document.getElementById('photo-caption').value = '';

    showToast('📸 写真を追加したよ！');
  } catch(e) {
    console.error('upload error:', e);
    showToast('アップロードに失敗したよ…');
  } finally {
    prog.remove();
  }
}

// ---- 年齢計算 ----
function calcAge(birthday) {
  if (!birthday) return '';
  const b = new Date(birthday);
  const now = new Date();
  const years = now.getFullYear() - b.getFullYear();
  const months = now.getMonth() - b.getMonth();
  const totalMonths = years * 12 + months;
  if (totalMonths < 12) return totalMonths + 'ヶ月';
  const y = Math.floor(totalMonths / 12);
  const m = totalMonths % 12;
  return m > 0 ? y + '歳' + m + 'ヶ月' : y + '歳';
}

        <span style="font-size:10px;color:var(--text-muted);font-weight:400;">${lastWater2F ? fmtTimeAgo(lastWater2F.ts)+'（'+lastWater2F.who+'）' : '未記録'}</span>
      </button>
    </div>
  </div>`;

  // 猫カード
  const catCards = CAT_IDS.map(catId => {
    const prof = getCatProfile(catId);
    const def = CAT_DEFAULTS[catId];
    const cat = getCat(catId);
    const name = prof.name || def.name;
    const age = calcAge(prof.birthday);
    const qlogs = cat.quick_log ? Object.values(cat.quick_log) : [];
    const lastFood = qlogs.filter(l=>l.type==='food').sort((a,b)=>b.ts-a.ts)[0] || null;
    const lastMed  = qlogs.filter(l=>l.type==='med').sort((a,b)=>b.ts-a.ts)[0]  || null;
    const weights  = cat.weight ? Object.values(cat.weight).sort((a,b)=>b.ts-a.ts) : [];
    const lastWeight = weights[0] || null;
    const todayNotes = cat.today_notes ? Object.values(cat.today_notes).sort((a,b)=>b.ts-a.ts) : [];
    const lastNote = todayNotes[0] || null;
    const avatarHtml = prof.icon_url
      ? `<div class="cat-avatar"><img src="${prof.icon_url}" /></div>`
      : `<div class="cat-avatar">${def.emoji}</div>`;
    return `<div class="cat-card">
      <div class="cat-card-header">
        ${avatarHtml}
        <div class="cat-info">
          <div class="cat-name">${esc(name)}</div>
          <div class="cat-age">${age}${prof.breed ? ' · '+esc(prof.breed) : ''}</div>
        </div>
        <button class="cat-detail-btn" style="width:auto;padding:6px 12px;font-size:12px;" onclick="openCatDetail('${catId}')">くわしく →</button>
      </div>

      <div class="cat-quick-btns">
        <button class="cat-quick-btn" onclick="quickLog('${catId}','food')">
          <span class="qicon">🍚</span>
          <span style="font-size:12px;font-weight:700;">ごはん</span>
          <span style="font-size:10px;color:var(--text-muted);font-weight:400;">${lastFood ? fmtTimeAgo(lastFood.ts)+'（'+lastFood.who+'）' : '未記録'}</span>
        </button>
        <button class="cat-quick-btn" onclick="quickWeightModal('${catId}')">
          <span class="qicon">⚖️</span>
          <span style="font-size:12px;font-weight:700;">体重</span>
          <span style="font-size:10px;color:var(--text-muted);font-weight:400;">${lastWeight ? lastWeight.value+'kg（'+lastWeight.who+'）' : '未記録'}</span>
        </button>
        <button class="cat-quick-btn" onclick="showTodayNoteModal('${catId}')">
          <span class="qicon">📝</span>
          <span style="font-size:12px;font-weight:700;">今日の様子</span>
          <span style="font-size:10px;color:var(--text-muted);font-weight:400;">${lastNote ? lastNote.time+'（'+lastNote.who+'）' : '未記録'}</span>
        </button>
      </div>
    </div>`;
  }).join('');

  topEl.innerHTML = `<div class="cats-top">${waterSection}${catCards}</div>`;
}

function fmtTimeAgo(ts) {
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'たった今';
  if (m < 60) return m + '分前';
  const h = Math.floor(m / 60);
  if (h < 24) return h + '時間前';
  return Math.floor(h / 24) + '日前';
}

async function saveCatProfile(catId) {
  const prof = {
    name:          document.getElementById('pf-name').value.trim(),
    birthday:      document.getElementById('pf-birthday').value,
    gender:        document.getElementById('pf-gender').value,
    breed:         document.getElementById('pf-breed').value.trim(),
    weight_min:    parseFloat(document.getElementById('pf-weight-min').value) || null,
    weight_max:    parseFloat(document.getElementById('pf-weight-max').value) || null,
    hospital_name: document.getElementById('pf-hospital-name').value.trim(),
    hospital_tel:  document.getElementById('pf-hospital-tel').value.trim(),
    hospital_url:  document.getElementById('pf-hospital-url').value.trim(),
    memo:          document.getElementById('pf-memo').value.trim(),
    icon_url:      getCatProfile(catId).icon_url || null,
  };
  if (db) await db.ref(`cats/${catId}/profile`).set(prof);
  else {
    if (!state.cats[catId]) state.cats[catId] = {};
    state.cats[catId].profile = prof;
  }
  showToast('プロフィールを保存したよ！');
  renderCatDetail();

async function uploadCatIcon(catId, input) {
  const file = input.files[0];
  if (!file) return;
  if (!storage) { showToast('Firebase Storageが設定されてないよ'); return; }
  showToast('アップロード中…');
  try {
    const ext = file.name.split('.').pop();
    const url = await uploadToStorage(file, `cats/${catId}/icon.${ext}`);
    if (db) await db.ref(`cats/${catId}/profile`).update({ icon_url: url });
    else { if(!state.cats[catId]) state.cats[catId]={}; state.cats[catId].profile = {...getCatProfile(catId), icon_url: url}; }
    showToast('アイコンを更新したよ！');
    renderCatDetail();
  } catch(e) {
    console.error(e);
    showToast('アップロードに失敗したよ…');
  }
}

async function addWeightRecord(catId, value, date) {
  const rec = { id: uid(), value, date, ts: new Date(date).getTime() || Date.now(), who: currentUser };
  if (db) await db.ref(`cats/${catId}/weight/${rec.id}`).set(rec);
  else {
    if (!state.cats[catId]) state.cats[catId] = {};

    state.cats[catId].weight[rec.id] = rec;

function renderCatWeight(el) {
  const catId = currentCatId;
  const cat = getCat(catId);
  const prof = getCatProfile(catId);
  const weights = cat.weight ? Object.values(cat.weight).sort((a,b)=>a.ts-b.ts) : [];

  el.innerHTML = `
    <div class="weight-add-bar">
      <input class="weight-input" id="w-val" type="number" step="0.01" placeholder="kg">
      <input class="form-input" id="w-date" type="date" value="${todayStr()}" style="flex:1;">
      <button class="btn-send" onclick="addWeightFromTab()">追加</button>
    </div>
    <div class="weight-chart-wrap">
      <canvas id="weight-chart" height="160"></canvas>
    </div>
    <div class="weight-list">
      ${weights.slice().reverse().map(w => `
        <div class="weight-item">
          <span class="weight-val">${w.value}kg</span>
          <span class="weight-date">${w.date}${w.who ? ' （'+esc(w.who)+'）' : ''}</span>
          <button class="weight-del" onclick="delWeight('${catId}','${w.id}')">✕</button>
        </div>
      `).join('') || '<div class="empty">まだ記録がないよ</div>'}
    </div>
  `;

  // Chart.js描画
  if (weights.length > 0 && typeof Chart !== 'undefined') {
    if (weightChartInstance) weightChartInstance.destroy();
    const ctx = document.getElementById('weight-chart').getContext('2d');
    const wMin = prof.weight_min || null;
    const wMax = prof.weight_max || null;
    weightChartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: weights.map(w => w.date),
        datasets: [
          {
            label: '体重(kg)',
            data: weights.map(w => w.value),
            borderColor: CAT_DEFAULTS[catId].color,
            backgroundColor: CAT_DEFAULTS[catId].color + '22',
            tension: 0.3,
            pointRadius: 4,
            fill: true,
          },
          ...(wMin && wMax ? [{
            label: '目標範囲',
            data: weights.map(() => wMax),
            borderColor: '#ccc',
            borderDash: [4,4],
            pointRadius: 0,
            fill: '+1',
            backgroundColor: 'rgba(200,200,200,0.15)',
          }, {
            label: '目標下限',
            data: weights.map(() => wMin),
            borderColor: '#ccc',
            borderDash: [4,4],
            pointRadius: 0,
            fill: false,
          }] : [])
        ]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: false } }
      }
    });
  }
}

      if (!state.cats[catId].medicine) state.cats[catId].medicine = {};
      state.cats[catId].medicine[med.id] = med;
    }
    // カレンダーにも追加
    if (med.next_date) {
      const ev = { id: uid(), date: med.next_date, title: `💊 ${(getCatProfile(catId).name||CAT_DEFAULTS[catId].name)} ${med.name}`, who: currentUser, catId };
      if (db) await db.ref(`events/${ev.id}`).set(ev);
    }
    showToast('薬を登録したよ💊');
    renderCatTabContent();
  });
}

function renderCatVisit(el) {
  const catId = currentCatId;
  const cat = getCat(catId);
  const visits = cat.visits ? Object.values(cat.visits).sort((a,b)=>b.ts-a.ts) : [];
  el.innerHTML = `
    <button class="form-save-btn" style="margin-bottom:14px;" onclick="showAddVisitModal('${catId}')">＋ 受診を記録する</button>
    ${visits.length ? visits.map(v => `
      <div class="visit-card">
        <button class="visit-del" onclick="delVisit('${catId}','${v.id}')">✕</button>
        <div class="visit-date">${v.date}</div>
        <div class="visit-hospital">🏥 ${esc(v.hospital||'')}${v.who ? ' <span style="font-size:11px;color:var(--text-muted);">（'+esc(v.who)+'）</span>' : ''}</div>
        ${v.diagnosis ? `<div class="visit-diag">${esc(v.diagnosis)}</div>` : ''}
        ${v.cost ? `<div class="visit-cost">¥${Number(v.cost).toLocaleString()}</div>` : ''}
        ${v.photos && v.photos.length ? `<div class="visit-photos">${v.photos.map(p=>`<img class="visit-photo" src="${p}" onclick="openPhotoOverlay2('${p}')">`).join('')}</div>` : ''}
      </div>
    `).join('') : '<div class="empty">まだ記録がないよ</div>'}
  `;
}

function showAddVisitModal(catId) {
  showModal(`
    <div class="modal-title">🏥 受診を記録</div>
    <input class="form-input" id="visit-date" type="date" value="${todayStr()}" style="margin-bottom:8px;">
    <input class="form-input" id="visit-hospital" placeholder="病院名" style="margin-bottom:8px;">
    <textarea class="textarea-input" id="visit-diag" placeholder="診断・メモ"></textarea>
    <input class="form-input" id="visit-cost" type="number" placeholder="費用（円）" style="margin-top:8px;margin-bottom:8px;">
    <label class="btn-upload" style="display:inline-flex;margin-bottom:8px;">
      📷 写真を追加
      <input type="file" accept="image/*" multiple style="display:none;" id="visit-photo-input">
    </label>
    <div id="visit-photo-preview" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
  `, async () => {
    const photos = [];
    const files = document.getElementById('visit-photo-input').files;
    if (files.length && storage) {
      for (const file of files) {
        try {
          const ext = file.name.split('.').pop();
          const url = await uploadToStorage(file, `visits/${catId}/${uid()}.${ext}`);
          photos.push(url);
        } catch(e) { console.error('visit photo upload error:', e); }
      }
    }
    const visit = {
      id: uid(),
      date: document.getElementById('visit-date').value,
      hospital: document.getElementById('visit-hospital').value.trim(),
      diagnosis: document.getElementById('visit-diag').value.trim(),
      cost: document.getElementById('visit-cost').value || null,
      photos,
      ts: Date.now(),
      who: currentUser,
    };
    if (db) await db.ref(`cats/${catId}/visits/${visit.id}`).set(visit);
    else {
      if (!state.cats[catId]) state.cats[catId] = {};
      if (!state.cats[catId].visits) state.cats[catId].visits = {};
      state.cats[catId].visits[visit.id] = visit;
    }
    showToast('受診記録を追加したよ🏥');
    renderCatTabContent();
  });
}

}

// ---- 共通モーダル ----
function showModal(bodyHtml, onOk) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-box">
      ${bodyHtml}
      <div class="modal-btns">
        <button class="modal-cancel" onclick="this.closest('.modal-overlay').remove()">キャンセル</button>
        <button class="modal-ok" id="modal-ok-btn">OK</button>
      </div>
    </div>
  `;
  overlay.querySelector('#modal-ok-btn').addEventListener('click', async () => {
    await onOk();
    overlay.remove();
  });
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}
// ============================================================
//  FCM / PWA / PUSH通知
// ============================================================
let messaging = null;
let fcmToken = null;

async function initFCM() {
  if (!useFirebase || !db) return;
  if (!APP_CONFIG.fcm || !APP_CONFIG.fcm.vapidKey || APP_CONFIG.fcm.vapidKey === 'YOUR_VAPID_KEY') return;

  try {
    // Service Worker 登録
    const swReg = await navigator.serviceWorker.register('/firebase-messaging-sw.js');

    // Service WorkerにFirebase設定を渡す
    if (swReg.active) {
      swReg.active.postMessage({ type: 'FIREBASE_CONFIG', config: APP_CONFIG.firebase });
    }
    swReg.addEventListener('updatefound', () => {
      const newSW = swReg.installing;
      newSW.addEventListener('statechange', () => {
        if (newSW.state === 'activated') {
          newSW.postMessage({ type: 'FIREBASE_CONFIG', config: APP_CONFIG.firebase });
        }
      });
    });

    messaging = firebase.messaging();

    // 通知許可をリクエスト
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') {
      console.log('通知許可が得られなかっただっちゃ');
      return;
    }

    // FCMトークン取得
    fcmToken = await messaging.getToken({ vapidKey: APP_CONFIG.fcm.vapidKey, serviceWorkerRegistration: swReg });
    if (fcmToken) {
      // トークンをFirebaseに保存（ユーザーと紐付け）
      await db.ref('fcmTokens/' + currentUser).set({ token: fcmToken, updatedAt: Date.now() });
      console.log('FCMトークン登録完了だっちゃ');
    }

    // フォアグラウンド通知
    messaging.onMessage((payload) => {
      const { title, body } = payload.notification || {};
      // アプリが開いてるときはトースト表示
      showToast((title || '') + ' ' + (body || ''));
    });

  } catch(e) {
    console.warn('FCM init error:', e);
  }
}

// チャット送信時に相手に通知（Firebase Functions不使用・Web Push直接）
// ※ FCMのサーバー送信はFirebase Functions or Cloud Runが必要なため
// ここではフォアグラウンド通知（アプリを開いてる相手への通知）のみ対応
// バックグラウンド通知はfirebase-messaging-sw.jsで処理

// PWAインストール案内（iOS）
function showPWAInstallHint() {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone === true;
  if (isIOS && !isStandalone) {
    showToast('📲 ホーム画面に追加すると通知が使えるよ！');
  }
}


// ===== Firebase Storage アップロード共通関数 =====
async function uploadToStorage(file, path) {
  if (!storage) throw new Error('Firebase Storageが初期化されてないよ');
  const ref = storage.ref(path);
  await ref.put(file);
  return await ref.getDownloadURL();
}
