<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <style>
    .paper { fill: #F5F2EC; stroke: #A89880; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
    .edge  { fill: none; stroke: #A89880; stroke-width: 1.3; stroke-linecap: round; }
    .divider { stroke: #C4B8A8; stroke-width: 1.3; stroke-linecap: round; stroke-dasharray: 4,3; }
    .memo  { stroke: #8C8070; stroke-width: 1.6; stroke-linecap: round; }
    .memo-short { stroke: #8C8070; stroke-width: 1.6; stroke-linecap: round; opacity: 0.5; }
    .box   { fill: none; stroke: #A89880; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .check { stroke: #7A8C7E; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .todo-line { stroke: #8C8070; stroke-width: 1.6; stroke-linecap: round; }
    .pencil { fill: none; stroke: #8C7E7A; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Paper body -->
  <path class="paper"
    d="M34,18 L114,15 Q123,15 124,24 L127,134 Q128,143 119,144 L41,146 Q32,146 31,137 L28,27 Q27,18 34,18 Z"
    transform="rotate(-1.2, 78, 82)"
  />

  <!-- Top torn edge -->
  <path class="edge"
    d="M34,18 Q52,23 78,17 Q104,11 114,15"
    transform="rotate(-1.2, 78, 82)"
  />

  <!-- === MEMO section (upper half) === -->


  <!-- memo lines (handwritten feel, slightly uneven) -->
  <line class="memo" x1="42" y1="36" x2="106" y2="34.5"/>
  <line class="memo" x1="42" y1="48" x2="100" y2="47"/>
  <line class="memo" x1="42" y1="60" x2="108" y2="59"/>
  <line class="memo-short" x1="42" y1="72" x2="78" y2="71.5"/>

  <!-- dashed divider -->
  <line class="divider" x1="36" y1="84" x2="122" y2="83"/>

  <!-- === TODO section (lower half) === -->
  <!-- Row 1: checked -->
  <rect class="box" x="40" y="92" width="14" height="14" rx="2.5" transform="rotate(-0.8, 47, 99)"/>
  <path class="check" d="M43,99 L47,104 L56,93" />
  <line class="todo-line" x1="63" y1="99" x2="108" y2="98.5"/>

  <!-- Row 2: unchecked -->
  <rect class="box" x="40" y="113" width="14" height="14" rx="2.5" transform="rotate(0.6, 47, 120)"/>
  <line class="todo-line" x1="63" y1="120" x2="104" y2="119.5"/>

  <!-- Row 3: unchecked short -->
  <rect class="box" x="40" y="134" width="14" height="12" rx="2.5"/>
  <line class="todo-line" x1="63" y1="140" x2="90" y2="139.5"/>
</svg>
