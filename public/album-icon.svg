<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <style>
    .frame  { fill: #F5F2EC; stroke: #A89880; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
    .photo  { stroke: #A89880; stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; }
    .mount  { stroke: #C4B8A8; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }
    .corner { fill: #8C7E7A; opacity: 0.5; }
    .line   { stroke: #8C8070; stroke-width: 1.4; stroke-linecap: round; opacity: 0.6; }
  </style>

  <!-- Album cover / book spine shadow -->
  <path d="M28,22 L36,18 L36,148 L28,144 Z"
    fill="#D4C8B8" stroke="#A89880" stroke-width="1.2" stroke-linejoin="round"/>

  <!-- Album body -->
  <rect class="frame" x="36" y="18" width="96" height="130" rx="3"
    transform="rotate(0.8, 84, 83)"/>

  <!-- Large photo top -->
  <rect class="photo" x="48" y="30" width="72" height="52" rx="2" fill="#EAE4DA"
    transform="rotate(0.8, 84, 56)"/>
  <!-- mountain silhouette inside photo -->
  <path d="M52,76 L66,52 L76,64 L86,46 L104,76 Z"
    fill="#C4B8A8" stroke="none" opacity="0.6"
    transform="rotate(0.8, 78, 61)"/>
  <!-- sun -->
  <circle cx="96" cy="40" r="5" fill="#D4C8B8" opacity="0.7"
    transform="rotate(0.8, 84, 56)"/>

  <!-- Corner mounts top photo -->
  <rect class="corner" x="48" y="30" width="7" height="7" rx="1" transform="rotate(0.8, 84, 56)"/>
  <rect class="corner" x="113" y="30" width="7" height="7" rx="1" transform="rotate(0.8, 84, 56)"/>
  <rect class="corner" x="48" y="75" width="7" height="7" rx="1" transform="rotate(0.8, 84, 56)"/>
  <rect class="corner" x="113" y="75" width="7" height="7" rx="1" transform="rotate(0.8, 84, 56)"/>

  <!-- Two small photos bottom -->
  <rect class="photo" x="48" y="92" width="32" height="26" rx="2" fill="#EAE4DA"
    transform="rotate(-0.5, 64, 105)"/>
  <!-- small photo content: circle -->
  <circle cx="64" cy="105" r="8" fill="#C4B8A8" opacity="0.5"
    transform="rotate(-0.5, 64, 105)"/>

  <rect class="photo" x="88" y="93" width="32" height="26" rx="2" fill="#EAE4DA"
    transform="rotate(1, 104, 106)"/>
  <!-- small photo content: hills -->
  <path d="M91,114 L98,103 L104,110 L110,100 L117,114 Z"
    fill="#C4B8A8" stroke="none" opacity="0.5"
    transform="rotate(1, 104, 106)"/>

  <!-- Caption lines -->
  <line class="line" x1="48" y1="126" x2="96" y2="125.5"/>
  <line class="line" x1="48" y1="134" x2="80" y2="133.5"/>
</svg>
