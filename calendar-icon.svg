<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <style>
    .cal    { fill: #F5F2EC; stroke: #A89880; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
    .header { fill: #E8E0D4; stroke: #A89880; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
    .ring   { fill: none; stroke: #8C8070; stroke-width: 2; stroke-linecap: round; }
    .grid   { stroke: #C4B8A8; stroke-width: 1.1; stroke-linecap: round; }
    .day    { fill: #8C8070; font-size: 10px; font-family: Georgia, serif; }
    .today  { fill: #7A8C7E; }
    .dot    { fill: #8C7E7A; opacity: 0.7; }
    .mark   { fill: none; stroke: #7A8C7E; stroke-width: 1.8; stroke-linecap: round; }
  </style>

  <!-- Calendar body -->
  <rect class="cal" x="22" y="30" width="116" height="112" rx="4"
    transform="rotate(-1, 80, 86)"/>

  <!-- Header bar -->
  <rect class="header" x="22" y="30" width="116" height="28" rx="4"
    transform="rotate(-1, 80, 44)"/>
  <!-- header bottom flat -->
  <rect fill="#E8E0D4" x="22" y="48" width="116" height="10"/>

  <!-- Ring bindings -->
  <path class="ring" d="M52,22 Q52,18 52,14 Q52,10 56,10 Q60,10 60,14 L60,36"/>
  <path class="ring" d="M100,22 Q100,18 100,14 Q100,10 104,10 Q108,10 108,14 L108,36"/>

  <!-- Month label area (dots as placeholder text) -->
  <line stroke="#A89880" stroke-width="1.4" stroke-linecap="round" x1="60" y1="42" x2="100" y2="41.5"/>

  <!-- Grid lines vertical -->
  <line class="grid" x1="38" y1="62" x2="38" y2="134"/>
  <line class="grid" x1="54" y1="62" x2="54" y2="134"/>
  <line class="grid" x1="70" y1="62" x2="70" y2="134"/>
  <line class="grid" x1="86" y1="62" x2="86" y2="134"/>
  <line class="grid" x1="102" y1="62" x2="102" y2="134"/>
  <line class="grid" x1="118" y1="62" x2="118" y2="134"/>

  <!-- Grid lines horizontal -->
  <line class="grid" x1="22" y1="62" x2="138" y2="62"/>
  <line class="grid" x1="22" y1="78" x2="138" y2="78"/>
  <line class="grid" x1="22" y1="94" x2="138" y2="94"/>
  <line class="grid" x1="22" y1="110" x2="138" y2="110"/>
  <line class="grid" x1="22" y1="126" x2="138" y2="126"/>

  <!-- Day dots (small circles as date numbers) -->
  <!-- row 1 -->
  <circle class="dot" cx="30" cy="70" r="2"/>
  <circle class="dot" cx="46" cy="70" r="2"/>
  <circle class="dot" cx="62" cy="70" r="2"/>
  <circle class="dot" cx="78" cy="70" r="2"/>
  <circle class="dot" cx="94" cy="70" r="2"/>
  <circle class="dot" cx="110" cy="70" r="2"/>
  <circle class="dot" cx="126" cy="70" r="2"/>
  <!-- row 2 -->
  <circle class="dot" cx="30" cy="86" r="2"/>
  <circle class="dot" cx="46" cy="86" r="2"/>
  <circle class="dot" cx="62" cy="86" r="2"/>
  <!-- today highlight -->
  <circle cx="78" cy="86" r="7" fill="#7A8C7E" opacity="0.2"/>
  <circle cx="78" cy="86" r="2.5" fill="#7A8C7E" opacity="0.9"/>
  <circle class="dot" cx="94" cy="86" r="2"/>
  <circle class="dot" cx="110" cy="86" r="2"/>
  <circle class="dot" cx="126" cy="86" r="2"/>
  <!-- row 3 -->
  <circle class="dot" cx="30" cy="102" r="2"/>
  <circle class="dot" cx="46" cy="102" r="2"/>
  <circle class="dot" cx="62" cy="102" r="2"/>
  <circle class="dot" cx="78" cy="102" r="2"/>
  <circle class="dot" cx="94" cy="102" r="2"/>
  <!-- small event mark -->
  <circle cx="110" cy="102" r="2" fill="#8C7E7A" opacity="0.7"/>
  <circle cx="110" cy="107" r="1.5" fill="#8C7E7A" opacity="0.5"/>
  <circle class="dot" cx="126" cy="102" r="2"/>
  <!-- row 4 -->
  <circle class="dot" cx="30" cy="118" r="2"/>
  <circle class="dot" cx="46" cy="118" r="2"/>
  <circle class="dot" cx="62" cy="118" r="2"/>
  <circle class="dot" cx="78" cy="118" r="2"/>
  <circle class="dot" cx="94" cy="118" r="2"/>
  <circle class="dot" cx="110" cy="118" r="2"/>
  <circle class="dot" cx="126" cy="118" r="2"/>
  <!-- row 5 -->
  <circle class="dot" cx="30" cy="132" r="2"/>
  <circle class="dot" cx="46" cy="132" r="2"/>
  <circle class="dot" cx="62" cy="132" r="2"/>
</svg>
