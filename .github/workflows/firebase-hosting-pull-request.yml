name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create config.js from secret
        run: echo "${{ secrets.CONFIG_JS }}" > config.js
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Copy config.js to dist
        run: cp config.js dist/config.js
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CHAT_A23CE }}
          projectId: chat-a23ce